name: docker-CICD

on:
  push:
    branch: main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v3

    - name: login to docker hub
      uses: docker/login-action@v2
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}
    - name: build backend and push to DH
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-backend ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-backend
    - name: build frontend and push to dhub
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend ./frontend
      
