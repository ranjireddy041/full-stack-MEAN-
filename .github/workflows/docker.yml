name: docker-CICD

on:
  push:
    branch: main
jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v4

    - name: login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}
    - name: build backend and push to DH
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-backend ./crud-dd-task-mean-app/backend
        docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:latest
    - name: build frontend and push to dhub
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend ./crud-dd-task-mean-app/frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/fullstack-frontend:latest
    - name: deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with: 
        host: ${{secrets.SERVER_IP}}
        username: ubuntu
        key: ${{secrets.SSH_KEY}}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/fullstack-backend:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}fullstack-frontend:latest
          docker-compose down
          docker-compose up -d 
        
 
